<footer class="site-footer">
  <div class="footer-container">
    <span class="footer-text">
      © {{ 'now' | date: '%Y' }} {{ site.author | default: "shinyay" }} — Built with ❤️ on GitHub
    </span>
    <div class="footer-links">
      {% if site.workshop.hub_url %}
      <a href="{{ site.workshop.hub_url }}" class="footer-link">Workshop Hub</a>
      <span class="footer-divider">·</span>
      {% endif %}
      {% assign repo_url = site.workshop.repo_url | default: site.github.repository_url %}
      {% if repo_url %}
      <a href="{{ repo_url }}" class="footer-link" target="_blank" rel="noopener">Source Code</a>
      {% endif %}
    </div>
  </div>
</footer>
