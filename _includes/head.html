<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}{% if page.title and site.title %} — {{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description | default: '' | strip_html | truncatewords: 50 }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description | default: '' }}">
<meta property="og:type" content="website">

<!-- Primer CSS (GitHub's design system) -->
<link href="https://cdn.jsdelivr.net/npm/@primer/css@22.1.0/dist/primer.min.css" rel="stylesheet">

<!-- Theme CSS -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">

{% include head-custom.html %}
